name: Set Upstox Token

on:
  repository_dispatch:
    types: [set-token]

  schedule:
    - cron: "0 3 * * 1-5"

  workflow_dispatch:

jobs:
  set-token:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright pyotp requests python-dotenv supabase
          playwright install chromium --with-deps

      - name: Get and store Upstox access token
        env:
          UPSTOX_PHONE:       ${{ secrets.UPSTOX_PHONE }}
          UPSTOX_PIN:         ${{ secrets.UPSTOX_PIN }}
          UPSTOX_TOTP_SECRET: ${{ secrets.UPSTOX_TOTP_SECRET }}
          HEADLESS:           "true"
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
        run: python scripts/upstox_auth.py
