name: Option Chain Collector

on:
  # High-priority external trigger (from cron-job.org)
  repository_dispatch:
    types: [manual-trigger]

  # Fallback: Every hour, Mon–Fri, 04:00–10:00 UTC
  schedule:
    - cron: "0 4-10 * * 1-5"

  # Manual trigger from UI
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend/render

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/render/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
          UPSTOX_ACCESS_TOKEN:   ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          FILTER_STRIKES_RADIUS: "20"
        run: python cron_job.py
